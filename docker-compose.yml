services:
  bot:
    build: .
    restart: unless-stopped
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      ALLOWED_GUILD_ID: ${ALLOWED_GUILD_ID}
      LLM_BACKEND: ${LLM_BACKEND}
      OLLAMA_URL: ${OLLAMA_URL:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-}
      LMSTUDIO_HOST: ${LMSTUDIO_HOST:-}
      LMSTUDIO_PORT: ${LMSTUDIO_PORT:-1234}
      LMSTUDIO_MODEL: ${LMSTUDIO_MODEL:-}
      LMSTUDIO_API_KEY: ${LMSTUDIO_API_KEY:-}
      MAX_HISTORY: ${MAX_HISTORY:-20}
      HISTORY_TTL: ${HISTORY_TTL:-14400}
      MAX_SEARCH_RESULTS: ${MAX_SEARCH_RESULTS:-4}
      GIPHY_API_KEY: ${GIPHY_API_KEY:-}
      GIF_COOLDOWN: ${GIF_COOLDOWN:-300}
      BLOCKED_CHANNELS: ${BLOCKED_CHANNELS:-}
      SYSTEM_PROMPT_FILE: ${SYSTEM_PROMPT_FILE:-system_prompt.txt}
      RANDOM_CONVO_CHANNELS: ${RANDOM_CONVO_CHANNELS:-}
      RANDOM_CONVO_INTERVAL: ${RANDOM_CONVO_INTERVAL:-10}
      DEBOUNCE_SECONDS: ${DEBOUNCE_SECONDS:-0.65}
      DEBOUNCE_TRIGGER_SECONDS: ${DEBOUNCE_TRIGGER_SECONDS:-0.18}
      CONTEXT_WINDOW_SECONDS: ${CONTEXT_WINDOW_SECONDS:-120}
      RANDOM_REPLY_CHANCE: ${RANDOM_REPLY_CHANCE:-8}
      RANDOM_REPLY_COOLDOWN: ${RANDOM_REPLY_COOLDOWN:-180}
      MEMORY_DB_PATH: ${MEMORY_DB_PATH:-data/user_memory.db}
      LLM_ERROR_COOLDOWN: ${LLM_ERROR_COOLDOWN:-60}
      EMBEDDING_URL: ${EMBEDDING_URL:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-nomic-embed-text-v1.5:2}
      MEMORY_TOP_K: ${MEMORY_TOP_K:-5}
    volumes:
      - ./data:/app/data
